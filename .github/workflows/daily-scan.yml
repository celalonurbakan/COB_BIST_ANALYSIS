name: BIST Günlük Tarama

on:
  schedule:
    # Her sabah 06:00 UTC = 09:00 İstanbul (Pazartesi-Cuma)
    - cron: '20 7 * * 1-5'
  workflow_dispatch:  # Manuel tetikleme (test için)

jobs:
  tarama:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: |
          pip install requests beautifulsoup4

      - name: Taramayı çalıştır
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          HEDEF_MAIL: ${{ secrets.HEDEF_MAIL }}
        run: |
          python tarama/scanner.py
